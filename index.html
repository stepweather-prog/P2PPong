<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2PPong v4 — Слепой Улей</title>
    <style>
        :root { --bg:#0a0a0a; --panel:#111; --accent:#c4a24b; --accent2:#e8d5a3; --text:#ccc; --dim:#888; --green:#4caf50; --red:#f44336; --orange:#ff9800; }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:monospace;padding:16px;min-height:100vh}
        .panel{background:var(--panel);border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:10px;max-width:620px}
        h2{color:var(--accent2);font-size:1em;margin-bottom:10px}
        .status{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
        .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
        .dot.online{background:var(--green);box-shadow:0 0 8px var(--green)}
        .dot.offline{background:var(--red)}
        .dot.busy{background:var(--orange);animation:pulse .8s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .log{background:#000;border-radius:8px;padding:10px;max-height:250px;overflow-y:auto;font-size:.65em;color:var(--dim)}
        .log .ok{color:var(--green)}.log .err{color:var(--red)}.log .info{color:var(--accent)}
        button{padding:8px 14px;border-radius:8px;border:1px solid var(--accent);background:rgba(196,162,75,.1);color:var(--accent);cursor:pointer;font-family:monospace;font-size:.75em;margin:3px;transition:.2s}
        button:hover{background:rgba(196,162,75,.25)}
        button:disabled{opacity:.4;cursor:not-allowed}
        button.danger{border-color:var(--red);color:var(--red)}
        button.accept{border-color:var(--green);color:var(--green)}
        input,textarea{padding:8px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:var(--text);font-family:monospace;font-size:.75em;width:100%;margin:3px 0;resize:vertical}
        .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
        .tag{font-size:.6em;padding:2px 8px;border-radius:4px;background:rgba(196,162,75,.1);white-space:nowrap}
        .card{background:rgba(255,255,255,.02);border:1px solid #333;border-radius:8px;padding:10px;margin:6px 0;font-size:.7em}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .card-title{color:var(--accent2);font-weight:bold}
        .card-meta{color:var(--dim);font-size:.85em}
        hr{border:0;border-top:1px solid #333;margin:8px 0}
    </style>
</head>
<body>

<div class="panel">
    <h2>🏹 P2PPong v4 — Слепой Улей</h2>
    <div class="status">
        <span class="dot busy" id="status-dot"></span>
        <span id="status-text">Инициализация...</span>
        <span class="tag" id="role-tag">пир</span>
        <span class="tag" id="dht-tag">DHT: -</span>
    </div>
    <div class="row">
        <span style="font-size:.7em;">Peer ID:</span>
        <code id="peer-id-display" style="color:var(--accent2);font-size:.7em;">-</code>
        <button onclick="copyPeerId()" style="font-size:.7em;padding:4px 8px;">📋</button>
    </div>
    <div style="font-size:.6em;color:var(--dim);margin-top:4px;">
        Каналов: <span id="ch-count">0</span> | 
        Стаканчиков: <span id="cup-count">0</span> | 
        Хранитель: <span id="seeder-status">нет</span>
    </div>
</div>

<!-- МАЯКИ -->
<div class="panel">
    <h2>📡 Маяки (ожидание подключения)</h2>
    <button onclick="createBeacon()">🏹 Создать маяк</button>
    <button onclick="refreshBeacons()">🔄 Обновить</button>
    <div id="beacons-list"></div>
</div>

<!-- ПОДКЛЮЧЕНИЕ -->
<div class="panel">
    <h2>🔗 Подключиться по Peer ID</h2>
    <div class="row">
        <input type="text" id="target-peer-id" placeholder="Peer ID друга..." style="flex:1;">
        <button onclick="connectByPeerId()">🤝 Запрос</button>
    </div>
    <div id="connect-result" style="font-size:.65em;color:var(--dim);margin-top:4px;"></div>
</div>

<!-- ЗАЯВКИ -->
<div class="panel">
    <h2>📞 Входящие заявки</h2>
    <button onclick="checkRequests()">🔄 Проверить</button>
    <div id="requests-list"></div>
</div>

<!-- КАНАЛЫ -->
<div class="panel">
    <h2>💬 Активные каналы</h2>
    <div id="channels-list"></div>
</div>

<!-- ОТПРАВКА -->
<div class="panel">
    <h2>📤 Отправить блоб</h2>
    <div class="row">
        <select id="channel-select" style="padding:6px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:var(--text);font-family:monospace;font-size:.75em;flex:1;">
            <option value="">Выбери канал...</option>
        </select>
    </div>
    <div class="row" style="margin-top:4px;">
        <input type="text" id="blob-input" placeholder="Сообщение..." style="flex:1;">
        <button onclick="sendBlob()">📤</button>
    </div>
    <div id="blobs-list" style="margin-top:8px;font-size:.65em;max-height:150px;overflow-y:auto;"></div>
</div>

<!-- ЛОГ -->
<div class="panel">
    <h2>📋 Лог</h2>
    <div class="log" id="log-box"></div>
    <button onclick="document.getElementById('log-box').innerHTML=''" style="margin-top:4px;font-size:.65em;">🗑 Очистить</button>
</div>

<script>
// ==================== P2PPong v4 — СЛЕПОЙ УЛЕЙ (ПОЛНАЯ ВЕРСИЯ) ====================
const PP4 = {
    _peerId: null,           // железный Peer ID
    _beacons: {},            // маяки: { id: { secret, hash, expires, createdAt } }
    _channels: {},           // каналы: { id: { secret, peerId, type:'cup'|'micro', blobs:[], expires, createdAt } }
    _requests: [],           // входящие заявки: [{ from, tempKeyHash, time }]
    _ws: null,               // WebSocket
    _wsUrl: 'wss://robincall.stephanclaps-491.workers.dev/ws',
    _dhtPeers: [],           // известные DHT пиры
    _isSeeder: false,
    _seederChannels: [],     // каналы которые я храню для других
};

// ========== ЖЕЛЕЗНЫЙ PEER ID ==========
async function generateHardwarePeerId() {
    const parts = [];
    try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const ext = gl.getExtension('WEBGL_debug_renderer_info');
        if(ext){parts.push(gl.getParameter(ext.UNMASKED_VENDOR_WEBGL));parts.push(gl.getParameter(ext.UNMASKED_RENDERER_WEBGL));}
    }catch(e){}
    try {
        const ctx = new AudioContext();
        parts.push(ctx.sampleRate.toString());
        parts.push(ctx.destination.maxChannelCount.toString());
        ctx.close();
    }catch(e){}
    parts.push(screen.width+'x'+screen.height);
    parts.push(screen.colorDepth.toString());
    parts.push(navigator.hardwareConcurrency||'');
    parts.push(navigator.deviceMemory||'');
    
    let salt = localStorage.getItem('pp4_hw_salt');
    if(!salt){salt=crypto.randomUUID();localStorage.setItem('pp4_hw_salt',salt);}
    parts.push(salt);
    
    const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(parts.join('|')));
    return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('').substring(0,32);
}

// ========== КРИПТО ==========
const SHA = async t => {
    const h = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t));
    return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
};
const RND = () => crypto.randomUUID?.() || Math.random().toString(36).substr(2)+Date.now().toString(36);

async function encryptAES(text, secret){
    const k = await crypto.subtle.importKey('raw', new TextEncoder().encode(secret.substring(0,32)), {name:'AES-GCM'}, false, ['encrypt']);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv}, k, new TextEncoder().encode(text));
    const c = new Uint8Array(iv.length+new Uint8Array(ct).length);
    c.set(iv);c.set(new Uint8Array(ct),iv.length);
    return btoa(String.fromCharCode(...c));
}

async function decryptAES(enc, secret){
    try{
        const k = await crypto.subtle.importKey('raw', new TextEncoder().encode(secret.substring(0,32)), {name:'AES-GCM'}, false, ['decrypt']);
        const c = Uint8Array.from(atob(enc), x=>x.charCodeAt(0));
        return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:c.slice(0,12)}, k, c.slice(12)));
    }catch(e){return null;}
}

// ========== СЛЕПОЙ БЛОБ (4KB паддинг) ==========
async function packBlob(data, secret){
    let payload = JSON.stringify({d:data, t:Date.now(), n:RND()});
    while(payload.length < 4000) payload += ' ';
    payload = payload.substring(0,4000);
    return await encryptAES(payload, secret);
}

async function unpackBlob(blob, secret){
    const dec = await decryptAES(blob, secret);
    if(!dec) return null;
    try{return JSON.parse(dec.trim());}catch(e){return null;}
}

// ========== WEB SOCKET ==========
function connectWS(){
    if(PP4._ws && PP4._ws.readyState === WebSocket.OPEN) return;
    
    try{
        PP4._ws = new WebSocket(PP4._wsUrl);
    }catch(e){
        log('WebSocket недоступен, fallback на polling','err');
        updateStatus('offline');
        startPollingFallback();
        return;
    }
    
    PP4._ws.onopen = () => {
        log('WebSocket подключён','ok');
        updateStatus('online');
        PP4._ws.send(JSON.stringify({action:'subscribe', peerId:PP4._peerId}));
        checkRequests();
        refreshBeacons();
    };
    
    PP4._ws.onmessage = async e => {
        let msg;
        try{msg=JSON.parse(e.data);}catch(err){return;}
        
        if(msg.type==='blob'){
            // Пробуем расшифровать для каждого канала
            for(const [chId,ch] of Object.entries(PP4._channels)){
                const unpacked = await unpackBlob(msg.blob, ch.secret);
                if(unpacked){
                    ch.blobs.push(unpacked);
                    ch.expires = Date.now() + 600000; // +10 минут
                    log(`📩 Сообщение в канале ${chId.substring(0,6)}...`,'info');
                    renderAll();
                    return;
                }
            }
            // Пробуем для сидерских каналов
            for(const sch of PP4._seederChannels){
                const unpacked = await unpackBlob(msg.blob, sch.secret);
                if(unpacked){
                    sch.blobs.push(unpacked);
                    log(`📦 Блоб для сидируемого канала`,'info');
                    return;
                }
            }
        }
        
        if(msg.type==='request'){
            PP4._requests.push({from:msg.from, tempKeyHash:msg.tempKeyHash, time:Date.now()});
            log(`📞 Заявка от ${msg.from.substring(0,8)}...`,'info');
            renderAll();
        }
        
        if(msg.type==='beacon-match'){
            const b = PP4._beacons[msg.beaconId];
            if(b){
                const chId = msg.channelId || RND();
                PP4._channels[chId] = {
                    secret: b.secret,
                    peerId: msg.peerId,
                    type: 'cup',
                    blobs: [],
                    expires: Date.now() + 600000,
                    createdAt: Date.now()
                };
                delete PP4._beacons[msg.beaconId];
                log(`✅ Маяк найден! Канал создан.`,'ok');
                renderAll();
            }
        }
        
        if(msg.type==='connect-ack'){
            const chId = msg.channelId || RND();
            PP4._channels[chId] = {
                secret: msg.secret,
                peerId: msg.peerId,
                type: 'cup',
                blobs: [],
                expires: Date.now() + 600000,
                createdAt: Date.now()
            };
            document.getElementById('connect-result').textContent = '✅ Подключено!';
            log(`✅ Канал создан с ${msg.peerId.substring(0,8)}...`,'ok');
            renderAll();
        }
    };
    
    PP4._ws.onclose = () => {
        log('WebSocket закрыт','err');
        updateStatus('busy');
        setTimeout(connectWS, 3000);
    };
    
    PP4._ws.onerror = () => updateStatus('offline');
}

// ========== ПОЛЛИНГ (FALLBACK) ==========
let pollInterval = null;
function startPollingFallback(){
    if(pollInterval) return;
    pollInterval = setInterval(async () => {
        try{
            const res = await fetch('https://robincall.stephanclaps-491.workers.dev/poll?peerId='+PP4._peerId);
            if(!res.ok) return;
            const data = await res.json();
            if(data.requests) PP4._requests = [...PP4._requests, ...data.requests];
            updateStatus('online');
        }catch(e){}
    }, 10000);
}

// ========== МАЯКИ ==========
async function createBeacon(){
    const secret = RND();
    const tempKeyHash = await SHA(secret);
    const beaconId = RND();
    
    PP4._beacons[beaconId] = {secret, hash: tempKeyHash, expires: Date.now()+1800000, createdAt: Date.now()};
    
    if(PP4._ws && PP4._ws.readyState === WebSocket.OPEN){
        PP4._ws.send(JSON.stringify({action:'beacon', beaconId, tempKeyHash, peerId:PP4._peerId}));
    }
    
    log(`🏹 Маяк создан. Peer ID: ${PP4._peerId.substring(0,12)}...`,'ok');
    renderAll();
}

async function refreshBeacons(){
    // Чистим протухшие
    const now = Date.now();
    for(const [id,b] of Object.entries(PP4._beacons)){
        if(now > b.expires) delete PP4._beacons[id];
    }
    renderAll();
}

// ========== ПОДКЛЮЧЕНИЕ ==========
async function connectByPeerId(){
    const targetId = document.getElementById('target-peer-id').value.trim();
    if(!targetId){log('Введи Peer ID','err');return;}
    
    const secret = RND();
    const tempKeyHash = await SHA(secret);
    
    document.getElementById('connect-result').textContent = '🔍 Ищу пира...';
    
    if(PP4._ws && PP4._ws.readyState === WebSocket.OPEN){
        PP4._ws.send(JSON.stringify({
            action:'connect',
            targetPeerId: targetId,
            tempKeyHash,
            fromPeerId: PP4._peerId,
            secret: secret
        }));
        log(`Запрос к ${targetId.substring(0,8)}...`,'info');
        document.getElementById('connect-result').textContent = '✅ Запрос отправлен. Жди ответа.';
    } else {
        document.getElementById('connect-result').textContent = '❌ Нет связи с сервером';
    }
}

// ========== ЗАЯВКИ ==========
async function checkRequests(){
    if(PP4._ws && PP4._ws.readyState === WebSocket.OPEN){
        PP4._ws.send(JSON.stringify({action:'check-requests', peerId:PP4._peerId}));
    }
    renderAll();
}

async function acceptRequest(index){
    const req = PP4._requests[index];
    if(!req) return;
    
    const secret = RND();
    
    if(PP4._ws && PP4._ws.readyState === WebSocket.OPEN){
        PP4._ws.send(JSON.stringify({
            action:'accept-request',
            fromPeerId: req.from,
            tempKeyHash: req.tempKeyHash,
            myPeerId: PP4._peerId,
            secret: secret
        }));
    }
    
    PP4._requests.splice(index,1);
    log(`✅ Заявка принята`,'ok');
    renderAll();
}

async function rejectRequest(index){
    PP4._requests.splice(index,1);
    log(`❌ Заявка отклонена`,'info');
    renderAll();
}

// ========== ОТПРАВКА БЛОБА ==========
async function sendBlob(){
    const text = document.getElementById('blob-input').value.trim();
    const chId = document.getElementById('channel-select').value;
    if(!text || !chId) return;
    
    const ch = PP4._channels[chId];
    if(!ch){log('Канал не найден','err');return;}
    
    const packed = await packBlob(text, ch.secret);
    
    if(PP4._ws && PP4._ws.readyState === WebSocket.OPEN){
        PP4._ws.send(JSON.stringify({action:'blob', channelId:chId, blob:packed, peerId:PP4._peerId}));
        ch.blobs.push({d:text, t:Date.now(), n:RND()});
        ch.expires = Date.now() + 600000;
        log(`📤 Отправлено: ${text.substring(0,40)}...`,'info');
        document.getElementById('blob-input').value = '';
        renderAll();
    }
}

// ========== UI ==========
function log(msg, type='info'){
    const box = document.getElementById('log-box');
    const time = new Date().toLocaleTimeString();
    box.innerHTML += `<div class="${type}">[${time}] ${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

function updateStatus(s){
    const dot = document.getElementById('status-dot');
    dot.className = 'dot '+s;
    document.getElementById('status-text').textContent = s==='online'?'Онлайн':s==='offline'?'Офлайн':'Занят';
}

function copyPeerId(){
    navigator.clipboard.writeText(PP4._peerId);
    log('Peer ID скопирован','ok');
}

function renderAll(){
    // Статистика
    document.getElementById('ch-count').textContent = Object.keys(PP4._channels).length;
    document.getElementById('cup-count').textContent = PP4._seederChannels.length;
    document.getElementById('seeder-status').textContent = PP4._isSeeder ? 'да' : 'нет';
    document.getElementById('dht-tag').textContent = 'DHT: '+PP4._dhtPeers.length+' пиров';
    document.getElementById('peer-id-display').textContent = PP4._peerId.substring(0,16)+'...';
    
    // Маяки
    const bl = document.getElementById('beacons-list');
    bl.innerHTML = Object.entries(PP4._beacons).map(([id,b]) => `
        <div class="card">
            <div class="card-header">
                <span class="card-title">🏹 Маяк ${id.substring(0,6)}...</span>
                <span class="card-meta">${Math.round((b.expires-Date.now())/60000)} мин</span>
            </div>
            <div style="font-size:.65em;color:var(--dim);">
                Peer ID: <code>${PP4._peerId.substring(0,12)}...</code>
            </div>
        </div>
    `).join('') || '<div style="color:var(--dim);font-size:.7em;">Нет активных маяков</div>';
    
    // Заявки
    const rl = document.getElementById('requests-list');
    rl.innerHTML = PP4._requests.map((r,i) => `
        <div class="card">
            <div class="card-header">
                <span class="card-title">📞 От: ${r.from.substring(0,8)}...</span>
                <span class="card-meta">${Math.round((Date.now()-r.time)/60000)} мин назад</span>
            </div>
            <div class="row" style="margin-top:6px;">
                <button class="accept" onclick="acceptRequest(${i})">✅ Принять</button>
                <button class="danger" onclick="rejectRequest(${i})">❌ Отклонить</button>
            </div>
        </div>
    `).join('') || '<div style="color:var(--dim);font-size:.7em;">Нет заявок</div>';
    
    // Каналы
    const cl = document.getElementById('channels-list');
    const sel = document.getElementById('channel-select');
    sel.innerHTML = '<option value="">Выбери канал...</option>';
    cl.innerHTML = Object.entries(PP4._channels).map(([id,ch]) => {
        sel.innerHTML += `<option value="${id}">${id.substring(0,6)}... (${ch.blobs.length} блобов)</option>`;
        return `
            <div class="card">
                <div class="card-header">
                    <span class="card-title">💬 Канал ${id.substring(0,6)}...</span>
                    <span class="card-meta">${ch.type} | ${ch.blobs.length} блобов | ${Math.round((ch.expires-Date.now())/60000)} мин</span>
                </div>
                <div style="font-size:.65em;color:var(--dim);">Пир: ${ch.peerId?.substring(0,8)||'?'}...</div>
                <div style="max-height:80px;overflow-y:auto;margin-top:4px;">
                    ${ch.blobs.slice(-5).map(b=>`<div style="font-size:.6em;color:var(--accent);">📩 ${b.d?.substring(0,60)||'[блоб]'}...</div>`).join('')}
                </div>
                <button class="danger" onclick="deleteChannel('${id}')" style="margin-top:4px;font-size:.6em;">🗑 Закрыть</button>
            </div>
        `;
    }).join('') || '<div style="color:var(--dim);font-size:.7em;">Нет активных каналов</div>';
    
    // Блобы текущего канала
    const selChId = document.getElementById('channel-select').value;
    const bbl = document.getElementById('blobs-list');
    if(selChId && PP4._channels[selChId]){
        bbl.innerHTML = PP4._channels[selChId].blobs.map(b => `
            <div style="font-size:.6em;color:var(--accent);margin:2px 0;">📩 ${b.d?.substring(0,80)||'[блоб]'}</div>
        `).join('');
    } else {
        bbl.innerHTML = '';
    }
}

function deleteChannel(id){
    delete PP4._channels[id];
    log(`Канал ${id.substring(0,6)}... закрыт`,'info');
    renderAll();
}

// ========== ОЧИСТКА ==========
setInterval(() => {
    const now = Date.now();
    for(const [id,ch] of Object.entries(PP4._channels)){
        if(now > ch.expires){delete PP4._channels[id];log(`Канал ${id.substring(0,6)}... истёк`,'info');}
    }
    for(const [id,b] of Object.entries(PP4._beacons)){
        if(now > b.expires) delete PP4._beacons[id];
    }
    PP4._requests = PP4._requests.filter(r => now - r.time < 1800000);
    renderAll();
}, 30000);

// ========== ИНИТ ==========
async function init(){
    log('🦅 P2PPong v4 — Слепой Улей','info');
    PP4._peerId = await generateHardwarePeerId();
    connectWS();
    renderAll();
    log(`Peer ID: ${PP4._peerId.substring(0,12)}...`,'ok');
}

init();
</script>
</body>
</html>
