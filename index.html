<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2PPong v1.2</title>
    <link rel="icon" href="data:,">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://p2ppong-v2.onrender.com https://robincall.stephanclaps-491.workers.dev">
    <style>
        :root { --bg: #0d1a0c; --bg2: #1a2a1f; --accent: #c4a24b; --accent2: #e8d5a3; --text: #e8e2c7; --dim: #b8a87a; --border: #c4a24b; --green: #4caf50; --red: #f44336; --orange: #ff9800; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:linear-gradient(135deg,var(--bg),var(--bg2)); color:var(--text); font-family:'Segoe UI','Inter',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .container { width:100%; max-width:500px; background:rgba(20,30,18,0.95); border:2px solid var(--border); border-radius:20px; padding:24px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
        h2 { text-align:center; background:linear-gradient(135deg,var(--accent2),var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:20px; }
        .status-row { display:flex; align-items:center; gap:8px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
        .status-dot { width:10px; height:10px; border-radius:50%; }
        .status-dot.online { background:var(--green); box-shadow:0 0 8px var(--green); }
        .status-dot.offline { background:var(--red); }
        .status-dot.checking { background:var(--orange); animation:pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .server-cards { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
        .server-card { flex:1; min-width:90px; padding:12px; border-radius:12px; border:1px solid var(--border); text-align:center; cursor:pointer; transition:0.2s; background:rgba(255,255,255,0.03); }
        .server-card:hover { background:rgba(196,162,75,0.15); }
        .server-card.active { border-color:var(--green); background:rgba(76,175,80,0.1); }
        .server-name { font-weight:bold; font-size:0.9em; color:var(--accent2); }
        .server-status { font-size:0.65em; color:var(--dim); margin-top:4px; }
        .log-box { background:rgba(0,0,0,0.4); border-radius:10px; padding:10px; max-height:200px; overflow-y:auto; font-family:monospace; font-size:0.6em; color:var(--dim); margin-top:12px; }
        .log-entry { margin:3px 0; } .log-entry.success { color:var(--green); } .log-entry.error { color:var(--red); } .log-entry.info { color:var(--accent2); }
        .stats-row { display:flex; justify-content:space-between; font-size:0.6em; color:var(--dim); margin-top:12px; flex-wrap:wrap; gap:4px; }
        button { width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:rgba(196,162,75,0.1); color:var(--text); cursor:pointer; font-weight:bold; font-size:0.9em; transition:0.2s; margin-top:8px; }
        button:hover { background:rgba(196,162,75,0.25); }
    </style>
</head>
<body>
<div class="container">
    <h2>🏹 P2PPong v1.2</h2>
    <div class="status-row">
        <span class="status-dot checking" id="status-dot"></span>
        <span id="status-text">Проверка...</span>
    </div>
    <div class="server-cards">
        <div class="server-card active" id="card-render"><div class="server-name">🌐 Render</div><div class="server-status" id="render-status">🟡 Проверка...</div></div>
        <div class="server-card" id="card-workers"><div class="server-name">⚡ Workers</div><div class="server-status" id="workers-status">🟡 Проверка...</div></div>
    </div>
    <button id="btn-refresh">🔄 Проверить</button>
    <div class="log-box" id="log-box"></div>
    <div class="stats-row">
        <span>ID: <span id="node-id">-</span></span>
        <span>Каналы: <span id="ch-count">0</span></span>
    </div>
</div>
<script>
const P2P={_s:[{id:"render",url:"https://p2ppong-v2.onrender.com"},{id:"workers",url:"https://robincall.stephanclaps-491.workers.dev"}],_ch:{},_pt:{},_ev:{},_pid:null,_sid:null,_rdy:!1};
P2P._rnd=()=>crypto.randomUUID?.()||Math.random().toString(36).substr(2)+Date.now().toString(36);
P2P._sha=async t=>{const d=new TextEncoder().encode(t);const h=await crypto.subtle.digest("SHA-256",d);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,"0")).join("")};
P2P._db=()=>new Promise((res,rej)=>{const r=indexedDB.open("PP",1);r.onupgradeneeded=()=>r.result.createObjectStore("id",{keyPath:"k"});r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
P2P._loadPid=async()=>{if(P2P._pid)return P2P._pid;try{const db=await P2P._db();const v=await new Promise(r=>{const q=db.transaction("id","readonly").objectStore("id").get("peerId");q.onsuccess=()=>r(q.result);q.onerror=()=>r(null)});if(v?.v){P2P._pid=v.v;return P2P._pid}}catch(e){}const fp=[navigator.userAgent,screen.width,screen.height].join("|");let salt=localStorage.getItem("s");if(!salt){salt=P2P._rnd();localStorage.setItem("s",salt)}const h=await P2P._sha(fp+"|"+salt);P2P._pid=h.substring(0,16);try{const db=await P2P._db();db.transaction("id","readwrite").objectStore("id").put({k:"peerId",v:P2P._pid})}catch(e){}return P2P._pid};
P2P._dk=async sec=>{const h=await P2P._sha(sec);const kb=new TextEncoder().encode(h.substring(0,32));return await crypto.subtle.importKey("raw",kb,{name:"AES-GCM"},false,["encrypt","decrypt"])};
P2P._enc=async(t,sec)=>{try{const k=await P2P._dk(sec);const iv=crypto.getRandomValues(new Uint8Array(12));const enc=new TextEncoder().encode(t);const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},k,enc);const c=new Uint8Array(iv.length+new Uint8Array(ct).length);c.set(iv);c.set(new Uint8Array(ct),iv.length);return "🔐"+btoa(String.fromCharCode(...c))}catch(e){return t}};
P2P._dec=async(enc,sec)=>{if(!enc||!enc.startsWith("🔐"))return null;try{const k=await P2P._dk(sec);const c=Uint8Array.from(atob(enc.substring(2)),x=>x.charCodeAt(0));const iv=c.slice(0,12);const ct=c.slice(12);const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv},k,ct);return new TextDecoder().decode(dec)}catch(e){return null}};
P2P._api=async(srv,method,path,body)=>{const s=P2P._s.find(s=>s.id===srv);if(!s)return null;const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),5000);try{const o={method,headers:{"Content-Type":"application/json"},signal:ctrl.signal};if(body)o.body=JSON.stringify(body);const r=await fetch(s.url+path,o);clearTimeout(t);return r.ok?await r.json():null}catch(e){clearTimeout(t);return null}};
P2P._poll=(sid,srv)=>{if(P2P._pt[sid])return;let last=Date.now();const poll=async()=>{const s=srv||P2P._ch[sid]?.srv;const res=await P2P._api(s,"GET","/message?id="+sid+"&since="+last);if(!res?.messages)return;for(const m of res.messages){const c=P2P._ch[sid];if(!c)continue;let dec=await P2P._dec(m.packet,c.sec);if(!dec){try{dec=JSON.parse(m.packet).text||m.packet}catch(e){dec=m.packet}}let sender=null,text=dec;try{const p=JSON.parse(dec);sender=p.sender;text=p.text||dec}catch(e){}if(sender===P2P._sid){last=Math.max(last,m.time>9999999999?m.time:m.time*1000);continue}if(P2P._ev.msg)P2P._ev.msg({text,channelId:sid,sender});last=Math.max(last,m.time>9999999999?m.time:m.time*1000)}};poll();P2P._pt[sid]=setInterval(poll,4000)};
P2P.createArrow=async()=>{if(!P2P._rdy)await P2P.init();const key=P2P._rnd();const kh=await P2P._sha(key);const sec=key;const results=[];for(const s of P2P._s){const body={tempKeyHash:kh,publicId:P2P._pid};const res=await P2P._api(s.id,"POST","/beacon",body);if(res?.sessionId)results.push({sessionId:res.sessionId,server:s.id})}if(!results.length){addLog("Серверы не отвечают","error");return}const primary=results[0];const sid=primary.sessionId;P2P._ch[sid]={sec,srv:primary.server,peerId:P2P._pid,last:Date.now()};const link="https://stepweather-prog.github.io/ROBINHOOD-P2P/?id="+sid+"&servers="+results.map(r=>r.server).join(",")+"&peer="+P2P._pid+"&key="+key;addLog("Стрела создана: "+sid.substring(0,12)+"...","success");let matched=false;const start=Date.now();while(Date.now()-start<300000){const checks=await Promise.all(results.map(r=>P2P._api(r.server,"GET","/beacon?id="+r.sessionId)));if(checks.some(c=>c?.matched)){matched=true;addLog("Маяк найден! Канал открыт.","success");break}await new Promise(r=>setTimeout(r,5000))}if(!matched){delete P2P._ch[sid];addLog("Таймаут ожидания","error");return}P2P._ch[sid].last=Date.now();P2P._poll(sid,P2P._ch[sid].srv)};
P2P.acceptArrow=async(key)=>{if(!P2P._rdy)await P2P.init();const kh=await P2P._sha(key);const sec=key;const params=new URLSearchParams(window.location.search);const servers=(params.get("servers")||"render,workers").split(",");const sid=params.get("id");const pid2=params.get("peer")||P2P._pid;for(const srv of servers){const body={tempKeyHash:kh,publicId:pid2};const res=await P2P._api(srv,"POST","/find",body);if(res?.status==="matched"){const cid=res.sessionId||sid;P2P._ch[cid]={sec,srv,peerId:pid2,last:Date.now()};P2P._poll(cid,srv);addLog("Канал открыт!","success");return}}addLog("Маяк не найден","error")};
P2P.sendMsg=async(cid,text)=>{if(!P2P._rdy)await P2P.init();const c=P2P._ch[cid];if(!c){addLog("Канал не найден","error");return}const payload=JSON.stringify({text,sender:P2P._sid,time:Date.now()});const encrypted=await P2P._enc(payload,c.sec);const res=await P2P._api(c.srv,"POST","/message",{sessionId:cid,packet:encrypted});if(!res){delete P2P._ch[cid];clearInterval(P2P._pt[cid]);delete P2P._pt[cid];addLog("Канал закрыт","error")}};
P2P.on=(ev,cb)=>{P2P._ev[ev]=cb};
P2P.getPeerId=()=>P2P._pid;
P2P.init=async()=>{if(P2P._rdy)return;P2P._sid=P2P._rnd();await P2P._loadPid();P2P._rdy=true;document.getElementById('node-id').textContent=P2P._pid.substring(0,12)+'...';document.getElementById('status-dot').className='status-dot online';document.getElementById('status-text').textContent='Готов';addLog("P2PPong v1.2 готов","info");if(P2P._ev.ready)P2P._ev.ready({peerId:P2P._pid})};
P2P.init().catch(e=>console.error(e));

function addLog(msg,type){const box=document.getElementById('log-box');if(!box)return;const div=document.createElement('div');div.className='log-entry '+type;div.textContent=new Date().toLocaleTimeString()+' '+msg;box.appendChild(div);box.scrollTop=box.scrollHeight}
document.getElementById('btn-refresh').addEventListener('click',()=>{location.reload()});
</script>
</body>
</html>
