<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2PPong v5.2 — Слепой Улей</title>
    <style>
        :root{--bg:#0a0a0a;--panel:#111;--accent:#c4a24b;--accent2:#e8d5a3;--text:#ccc;--dim:#888;--green:#4caf50;--red:#f44336;--orange:#ff9800}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:monospace;padding:16px;min-height:100vh}
        .panel{background:var(--panel);border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:10px;max-width:680px}
        h2{color:var(--accent2);font-size:1em;margin-bottom:10px}
        .status{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
        .dot{width:10px;height:10px;border-radius:50%}
        .dot.online{background:var(--green);box-shadow:0 0 8px var(--green)}
        .dot.offline{background:var(--red)}
        .dot.waiting{background:var(--orange);animation:pulse .8s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .log{background:#000;border-radius:8px;padding:10px;max-height:300px;overflow-y:auto;font-size:.6em;color:var(--dim)}
        .log .ok{color:var(--green)}.log .err{color:var(--red)}.log .info{color:var(--accent)}.log .warn{color:var(--orange)}
        button{padding:8px 14px;border-radius:8px;border:1px solid var(--accent);background:rgba(196,162,75,.1);color:var(--accent);cursor:pointer;font-family:monospace;font-size:.75em;margin:3px}
        button:hover{background:rgba(196,162,75,.25)}
        button.accept{border-color:var(--green);color:var(--green)}
        button.danger{border-color:var(--red);color:var(--red)}
        input,select{padding:8px;border-radius:8px;border:1px solid #333;background:#1a1a1a;color:var(--text);font-family:monospace;font-size:.75em;width:100%;margin:3px 0}
        .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
        .tag{font-size:.6em;padding:2px 8px;border-radius:4px;background:rgba(196,162,75,.1)}
        .card{background:rgba(255,255,255,.02);border:1px solid #333;border-radius:8px;padding:10px;margin:6px 0;font-size:.7em}
        .card-title{color:var(--accent2)}
    </style>
</head>
<body>

<div class="panel">
    <h2>🕸️ P2PPong v5.2 — Слепой Улей</h2>
    <div class="status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Инициализация...</span>
        <span class="tag" id="ws-tag">WS: -</span>
    </div>
    <div class="row">
        <span style="font-size:.7em;">Peer ID:</span>
        <code id="peer-id-display" style="color:var(--accent2);">-</code>
        <button onclick="copyPeerId()">📋</button>
    </div>
    <div style="font-size:.6em;color:var(--dim);">Каналов: <span id="ch-count">0</span></div>
</div>

<div class="panel">
    <h2>📡 Создать маяк</h2>
    <div class="row">
        <input type="text" id="target-peer-id" placeholder="Peer ID друга..." style="flex:1;">
        <button onclick="createBeacon()">🏹 Создать маяк</button>
    </div>
    <div id="beacon-status" style="font-size:.7em;color:var(--accent);margin-top:4px;"></div>
</div>

<div class="panel">
    <h2>📩 Входящие маяки</h2>
    <div id="incoming-beacons"></div>
</div>

<div class="panel">
    <h2>💬 Каналы</h2>
    <div id="channels-list"></div>
</div>

<div class="panel">
    <h2>📤 Сообщение</h2>
    <div class="row">
        <select id="channel-select" style="flex:1;"><option value="">Выбери канал...</option></select>
    </div>
    <div class="row" style="margin-top:4px;">
        <input type="text" id="msg-input" placeholder="Сообщение..." style="flex:1;">
        <button onclick="sendMsg()">📤</button>
    </div>
</div>

<div class="panel">
    <h2>📋 Лог</h2>
    <div class="log" id="log-box"></div>
</div>

<script>
// ==================== P2PPong v5.2 — СЛЕПОЙ УЛЕЙ ====================
const PP4={_peerId:null,_beacons:{},_channels:{},_ws:null,_wsUrl:'wss://robincall.stephanclaps-491.workers.dev/ws',_wsReconnectDelay:1000,_maxReconnectDelay:30000};
if(!window.crypto?.subtle)throw new Error('Требуется HTTPS');
const RND=()=>{const a=new Uint32Array(4);crypto.getRandomValues(a);return[...a].map(x=>x.toString(16).padStart(8,'0')).join('');};
const SHA=async t=>{const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');};
async function generateHardwarePeerId(){const p=[];try{const c=document.createElement('canvas');const gl=c.getContext('webgl');const ext=gl.getExtension('WEBGL_debug_renderer_info');if(ext){p.push(gl.getParameter(ext.UNMASKED_VENDOR_WEBGL));p.push(gl.getParameter(ext.UNMASKED_RENDERER_WEBGL));}}catch(e){}try{const ctx=new AudioContext();p.push(ctx.sampleRate.toString());p.push(ctx.destination.maxChannelCount.toString());ctx.close();}catch(e){}p.push(screen.width+'x'+screen.height,screen.colorDepth.toString(),navigator.hardwareConcurrency||'',navigator.deviceMemory||'');let s=localStorage.getItem('pp4_hw_salt');if(!s){s=RND();localStorage.setItem('pp4_hw_salt',s);}p.push(s);const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p.join('|')));return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('').substring(0,32);}
async function generateKeyPair(){return await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-256'},true,['deriveBits']);}
async function exportPublicKey(kp){const r=await crypto.subtle.exportKey('raw',kp.publicKey);return btoa(String.fromCharCode(...new Uint8Array(r)));}
async function importPublicKey(b64){const r=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));return await crypto.subtle.importKey('raw',r,{name:'ECDH',namedCurve:'P-256'},false,[]);}
async function deriveSecret(kp,remotePubKey){const b=await crypto.subtle.deriveBits({name:'ECDH',public:remotePubKey},kp.privateKey,256);return Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function encryptAES(text,secret){const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(secret.substring(0,32)),{name:'AES-GCM'},false,['encrypt']);const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(text));const c=new Uint8Array(iv.length+new Uint8Array(ct).length);c.set(iv);c.set(new Uint8Array(ct),iv.length);return btoa(String.fromCharCode(...c));}
async function decryptAES(enc,secret){try{const k=await crypto.subtle.importKey('raw',new TextEncoder().encode(secret.substring(0,32)),{name:'AES-GCM'},false,['decrypt']);const c=Uint8Array.from(atob(enc),x=>x.charCodeAt(0));return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:c.slice(0,12)},k,c.slice(12)));}catch(e){return null;}}

const BLOB_NS='00000000000000000000000000000000';
let incomingBeacons=[]; // входящие маяки (только для UI)

async function createBeacon(){
    const targetId=document.getElementById('target-peer-id').value.trim();
    if(!targetId){log('Введи Peer ID друга','err');return;}
    const kp=await generateKeyPair();const pk=await exportPublicKey(kp);const nonce=RND();const bid=RND();
    const beaconKey=await SHA(nonce+'beacon');
    const inner=await encryptAES(JSON.stringify({nonce:nonce,timestamp:Date.now(),peerId:PP4._peerId}),beaconKey);
    const beacon={type:'beacon',pubKey:pk,peerId:PP4._peerId,inner:inner,targetPeerId:targetId};
    PP4._beacons[bid]={keyPair:kp,pubKey:pk,nonce:nonce,beaconKey:beaconKey,expires:Date.now()+300000};
    broadcastBlob(JSON.stringify(beacon),BLOB_NS);
    document.getElementById('beacon-status').textContent='⏳ Маяк отправлен. Ожидаю ответа...';
    log('🏹 Маяк отправлен для '+targetId.substring(0,8)+'...','info');
}

async function acceptBeacon(index){
    const beacon=incomingBeacons[index];
    if(!beacon)return;
    const data=beacon.data;
    const remotePubKey=await importPublicKey(data.pubKey);const kp=await generateKeyPair();const myPubKey=await exportPublicKey(kp);
    const ss=await deriveSecret(kp,remotePubKey);const chId=RND();
    PP4._channels[chId]={secret:ss,peerId:data.peerId,type:'cup',blobs:[],expires:Date.now()+600000};
    broadcastBlob(JSON.stringify({type:'beacon-response',pubKey:myPubKey,peerId:PP4._peerId,inner:data.inner}),BLOB_NS);
    incomingBeacons.splice(index,1);
    document.getElementById('beacon-status').textContent='';
    log('✅ Принято! Канал открыт.','ok');
    renderAll();
}

function rejectBeacon(index){
    incomingBeacons.splice(index,1);
    log('❌ Маяк отклонён','info');
    renderAll();
}

async function handleIncomingBlob(blobData,channelId){
    let data;try{data=JSON.parse(blobData);}catch(e){return;}
    
    // Входящий маяк
    if(data.type==='beacon'&&data.pubKey&&data.inner){
        if(data.targetPeerId&&data.targetPeerId!==PP4._peerId)return;
        log('📡 Входящий маяк от '+data.peerId.substring(0,8)+'...','info');
        incomingBeacons.push({data,time:Date.now()});
        renderAll();return;
    }
    
    // Ответ на наш маяк
    if(data.type==='beacon-response'&&data.pubKey&&data.inner){
        for(const[bid,b]of Object.entries(PP4._beacons)){
            if(!b.beaconKey)continue;
            const dec=await decryptAES(data.inner,b.beaconKey);if(!dec)continue;
            let payload;try{payload=JSON.parse(dec);}catch(e){continue;}
            if(payload.nonce!==b.nonce)continue;
            const remotePubKey=await importPublicKey(data.pubKey);const ss=await deriveSecret(b.keyPair,remotePubKey);const chId=RND();
            PP4._channels[chId]={secret:ss,peerId:data.peerId,type:'cup',blobs:[],expires:Date.now()+600000};
            delete PP4._beacons[bid];
            document.getElementById('beacon-status').textContent='✅ Подключено!';
            log('✅ Канал открыт!','ok');
            renderAll();return;
        }
    }
    
    // Обычное сообщение
    for(const[id,ch]of Object.entries(PP4._channels)){
        if(!ch.secret)continue;
        const dec=await decryptAES(blobData,ch.secret);if(!dec)continue;
        try{const msg=JSON.parse(dec);ch.blobs.push({...msg,from:'them'});ch.expires=Date.now()+600000;
        log('📩 '+((msg.d||'').substring(0,30)),'info');renderAll();return;}catch(e){}
    }
}

function broadcastBlob(packed,channelId){
    if(PP4._ws&&PP4._ws.readyState===WebSocket.OPEN){
        PP4._ws.send(JSON.stringify({type:'blob',channelId:channelId||BLOB_NS,blob:packed,peerId:PP4._peerId}));
    }
}

async function sendMsg(){
    const text=document.getElementById('msg-input').value.trim();
    const chId=document.getElementById('channel-select').value;
    if(!text||!chId)return;
    const ch=PP4._channels[chId];if(!ch||!ch.secret)return;
    const packed=await encryptAES(JSON.stringify({d:text,t:Date.now()}),ch.secret);
    broadcastBlob(packed,chId);
    ch.blobs.push({d:text,t:Date.now(),from:'me'});ch.expires=Date.now()+600000;
    log('📤 '+text.substring(0,30),'info');document.getElementById('msg-input').value='';renderAll();
}

function connectWS(){
    if(PP4._ws&&PP4._ws.readyState===WebSocket.OPEN)return;
    try{PP4._ws=new WebSocket(PP4._wsUrl);}catch(e){setTimeout(connectWS,PP4._wsReconnectDelay);PP4._wsReconnectDelay=Math.min(PP4._wsReconnectDelay*2,PP4._maxReconnectDelay);return;}
    PP4._ws.onopen=()=>{PP4._wsReconnectDelay=1000;updateStatus('online');document.getElementById('ws-tag').textContent='WS: онлайн';PP4._ws.send(JSON.stringify({action:'subscribe',peerId:PP4._peerId}));};
    PP4._ws.onmessage=async e=>{let m;try{m=JSON.parse(e.data);}catch(er){return;}if(m.type==='blob'){handleIncomingBlob(m.blob,m.channelId);}};
    PP4._ws.onclose=()=>{updateStatus('offline');document.getElementById('ws-tag').textContent='WS: офлайн';setTimeout(connectWS,PP4._wsReconnectDelay);PP4._wsReconnectDelay=Math.min(PP4._wsReconnectDelay*2,PP4._maxReconnectDelay);};
}

function log(msg,type='info'){const box=document.getElementById('log-box');box.innerHTML+=`<div class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;box.scrollTop=box.scrollHeight;}
function updateStatus(s){const dot=document.getElementById('status-dot');dot.className='dot '+s;document.getElementById('status-text').textContent=s==='online'?'Онлайн':'Офлайн';}
function copyPeerId(){navigator.clipboard.writeText(PP4._peerId);log('Peer ID скопирован','ok');}
function renderAll(){
    document.getElementById('peer-id-display').textContent=PP4._peerId?.substring(0,16)+'...';
    document.getElementById('ch-count').textContent=Object.keys(PP4._channels).length;
    // Входящие маяки
    document.getElementById('incoming-beacons').innerHTML=incomingBeacons.map((b,i)=>`
        <div class="card">
            <span class="card-title">📡 Маяк от ${b.data.peerId.substring(0,8)}...</span>
            <div class="row" style="margin-top:6px;">
                <button class="accept" onclick="acceptBeacon(${i})">✅ Принять</button>
                <button class="danger" onclick="rejectBeacon(${i})">❌ Отклонить</button>
            </div>
        </div>
    `).join('')||'Нет входящих маяков';
    // Каналы
    const sel=document.getElementById('channel-select');sel.innerHTML='<option value="">Выбери канал...</option>';
    document.getElementById('channels-list').innerHTML=Object.entries(PP4._channels).map(([id,ch])=>{
        sel.innerHTML+=`<option value="${id}">${id.substring(0,6)}... (${ch.blobs.length})</option>`;
        return`<div class="card"><span class="card-title">💬 ${id.substring(0,6)}...</span> | Пир: ${ch.peerId?.substring(0,8)||'?'}... | Блобов: ${ch.blobs.length}</div>`;
    }).join('')||'Нет каналов';
}

setInterval(()=>{const now=Date.now();for(const[id,ch]of Object.entries(PP4._channels)){if(now>ch.expires)delete PP4._channels[id];}for(const[id,b]of Object.entries(PP4._beacons)){if(now>b.expires)delete PP4._beacons[id];}incomingBeacons=incomingBeacons.filter(b=>now-b.time<300000);renderAll();},10000);

async function init(){
    PP4._peerId=await generateHardwarePeerId();
    connectWS();renderAll();
    log('P2PPong v5.2 — вставь Peer ID друга и создай маяк','info');
}
init();
</script>
</body>
</html>
