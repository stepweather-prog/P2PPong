<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2PPong — надёжная стрела</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #121212; color: #eee; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        #status { color: #888; font-size: 0.9em; margin: 5px 0; }
    </style>
</head>
<body>
<div class="container">
    <h3>⚡ P2PPong — арбитр</h3>
    <div id="status">Запуск...</div>
</div>

<script>
const RENDER_SERVER = 'https://p2ppong.onrender.com';
const statusDiv = document.getElementById('status');

let peerConnection;
let dataChannel;
let sessionId;
let pollingInterval;
let parentOrigin = '*'; // Принимаем сообщения от любого родителя

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function generateUUID() {
    return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);
}

async function postToServer(payload) {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 80000);
    try {
        const res = await fetch(RENDER_SERVER + '/offer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            signal: ctrl.signal
        });
        clearTimeout(to);
        return res.ok;
    } catch(e) {
        clearTimeout(to);
        return false;
    }
}

async function getFromServer(sessionId) {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 4000);
    try {
        const res = await fetch(RENDER_SERVER + '/offer?id=' + sessionId, { signal: ctrl.signal });
        clearTimeout(to);
        if (res.ok) {
            const data = await res.json();
            return data;
        }
    } catch(e) {
        clearTimeout(to);
    }
    return null;
}

function sendToParent(msg) {
    if (window.parent && window.parent !== window) {
        window.parent.postMessage(msg, '*');
    }
}

// ========== ПРОВЕРКА RENDER ==========
async function checkRender() {
    try {
        const ctrl = new AbortController();
        const to = setTimeout(() => ctrl.abort(), 5000);
        await fetch(RENDER_SERVER + '/offer?id=ping', { signal: ctrl.signal });
        clearTimeout(to);
    } catch(e) {}
    // Render ответил (даже 404 — значит жив)
    statusDiv.textContent = 'Понг готов';
    sendToParent({ type: 'pong-ready' });
}

// ========== СОЗДАНИЕ СЕССИИ (Робин А) ==========
async function createSession() {
    statusDiv.textContent = 'Создаю сессию...';
    
    sessionId = generateUUID();
    const link = window.location.origin + window.location.pathname + '?id=' + sessionId;
    
    // Отправляем ссылку RobinHood'у
    sendToParent({ type: 'link', link: link });
    sendToParent({ type: 'status', text: 'Ожидаю получателя...', duration: 0 });
    
    // Ждём ready от получателя
    const ready = await waitForReady();
    if (!ready) {
        sendToParent({ type: 'error', text: 'Таймаут: получатель не открыл ссылку.' });
        return;
    }
    
    sendToParent({ type: 'status', text: 'Получатель готов. Создаю канал...', duration: 0 });
    
    // Создаём WebRTC offer
    peerConnection = new RTCPeerConnection();
    dataChannel = peerConnection.createDataChannel('chat');
    setupDataChannel(dataChannel);
    
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    
    await waitForIceComplete();
    
    await postToServer({ sdp: peerConnection.localDescription.sdp, sessionId: sessionId });
    
    sendToParent({ type: 'status', text: 'Жду ответа...', duration: 0 });
    
    // Ждём answer
    const answerSdp = await waitForAnswer();
    if (!answerSdp) {
        sendToParent({ type: 'error', text: 'Таймаут ответа.' });
        return;
    }
    
    await peerConnection.setRemoteDescription({ type: 'answer', sdp: answerSdp });
    sendToParent({ type: 'channel-open' });
}

async function waitForReady() {
    const startTime = Date.now();
    while (Date.now() - startTime < 90000) {
        const data = await getFromServer(sessionId);
        if (data && data.status === 'ready') return true;
        await new Promise(r => setTimeout(r, 2000));
    }
    return false;
}

async function waitForAnswer() {
    const startTime = Date.now();
    while (Date.now() - startTime < 90000) {
        const data = await getFromServer(sessionId);
        if (data && data.sdp && data.sdp !== peerConnection.localDescription.sdp) return data.sdp;
        await new Promise(r => setTimeout(r, 2000));
    }
    return null;
}

// ========== ПРИНЯТИЕ СЕССИИ (Робин Б) ==========
async function acceptSession(id) {
    sessionId = id;
    statusDiv.textContent = 'Принимаю сессию...';
    
    sendToParent({ type: 'status', text: 'Подключаюсь...', duration: 0 });
    
    // Отправляем ready
    await postToServer({ status: 'ready', sessionId: sessionId });
    
    sendToParent({ type: 'status', text: 'Жду offer...', duration: 0 });
    
    // Ждём offer
    const offerSdp = await waitForOffer();
    if (!offerSdp) {
        sendToParent({ type: 'error', text: 'Таймаут: создатель не ответил.' });
        return;
    }
    
    sendToParent({ type: 'status', text: 'Создаю ответ...', duration: 0 });
    
    peerConnection = new RTCPeerConnection();
    peerConnection.ondatachannel = (e) => {
        dataChannel = e.channel;
        setupDataChannel(dataChannel);
    };
    
    await peerConnection.setRemoteDescription({ type: 'offer', sdp: offerSdp });
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    
    await waitForIceComplete();
    
    await postToServer({ sdp: peerConnection.localDescription.sdp, sessionId: sessionId });
    sendToParent({ type: 'channel-open' });
}

async function waitForOffer() {
    const startTime = Date.now();
    while (Date.now() - startTime < 90000) {
        const data = await getFromServer(sessionId);
        if (data && data.sdp) return data.sdp;
        await new Promise(r => setTimeout(r, 2000));
    }
    return null;
}

// ========== ОБЩИЙ КОД ==========
function setupDataChannel(channel) {
    channel.onopen = () => {
        statusDiv.textContent = 'Канал открыт';
    };
    channel.onmessage = (e) => {
        // Пересылаем сообщение RobinHood'у
        sendToParent({ type: 'message', text: e.data, sender: 'Друг' });
    };
}

async function waitForIceComplete() {
    return new Promise(resolve => {
        if (peerConnection.iceGatheringState === 'complete') resolve();
        else peerConnection.addEventListener('icegatheringstatechange', () => {
            if (peerConnection.iceGatheringState === 'complete') resolve();
        });
    });
}

// ========== СЛУШАЕМ КОМАНДЫ ОТ ROBINHOOD ==========
window.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || !data.action) return;
    
    switch(data.action) {
        case 'create':
            createSession();
            break;
        case 'accept':
            acceptSession(data.id);
            break;
        case 'send':
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(data.text);
            }
            break;
        case 'manual-sdp':
            handleManualSdp(data.sdp);
            break;
    }
});

async function handleManualSdp(sdpText) {
    try {
        const sdpObj = JSON.parse(sdpText);
        const pc = new RTCPeerConnection();
        if (sdpObj.type === 'offer') {
            pc.ondatachannel = (e) => {
                dataChannel = e.channel;
                setupDataChannel(dataChannel);
            };
            await pc.setRemoteDescription(sdpObj);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            sendToParent({ type: 'status', text: 'Ответ готов: ' + JSON.stringify(pc.localDescription), duration: 10000 });
        } else {
            dataChannel = pc.createDataChannel('chat');
            setupDataChannel(dataChannel);
            await pc.setRemoteDescription(sdpObj);
            sendToParent({ type: 'channel-open' });
        }
    } catch(e) {
        sendToParent({ type: 'error', text: 'Ошибка SDP: ' + e.message });
    }
}

// ========== ЗАПУСК ==========
checkRender();
</script>
</body>
</html>
